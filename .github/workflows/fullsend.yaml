# fullsend shim workflow
# Routes events to agent workflows in .fullsend via the dispatch.yml workflow.
#
# Credentials: generates a GitHub App installation token (via
# FULLSEND_DISPATCH_CLIENT_ID and FULLSEND_DISPATCH_APP_PRIVATE_KEY) with
# actions:write permission to trigger dispatch.yml in owner/.fullsend.
# The dispatcher scans for agent workflows and triggers them.
#
# Security: pull_request_target runs the BASE branch version of this workflow,
# preventing PRs from modifying it to exfiltrate credentials.
# This shim never checks out PR code, so it is not vulnerable to "pwn request"
# attacks (see: Trivy CVE-2026-33634, hackerbot-claw campaign).
#
# The event payload is passed via an environment variable (not inline shell)
# to prevent script injection from attacker-controlled fields like issue
# titles, comment bodies, and PR descriptions.
name: fullsend

permissions:
  contents: read

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

jobs:
  dispatch-triage:
    runs-on: ubuntu-latest
    concurrency:
      group: triage-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    if: >-
      github.event_name == 'issue_comment' && (
        github.event.comment.body == '/triage' ||
        startsWith(github.event.comment.body, '/triage ') ||
        (
          (github.event.comment.author_association != 'NONE' ||
            github.event.comment.user.login == github.event.issue.user.login) &&
          !endsWith(github.event.comment.user.login, '[bot]') &&
          contains(toJSON(github.event.issue.labels.*.name), 'needs-info') &&
          !contains(toJSON(github.event.issue.labels.*.name), 'type/feature')
        )
      )
    steps:
      - name: Generate dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FULLSEND_DISPATCH_CLIENT_ID }}
          private-key: ${{ secrets.FULLSEND_DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: .fullsend
          permission-actions: write

      - name: Dispatch triage stage
        env:
          GH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
          EVENT_TYPE: ${{ github.event_name }}
          SOURCE_REPO: ${{ github.repository }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
        run: |
          gh workflow run dispatch.yml \
            --repo "$DISPATCH_REPO" \
            -f stage=triage \
            -f event_type="$EVENT_TYPE" \
            -f source_repo="$SOURCE_REPO" \
            -f event_payload="$EVENT_PAYLOAD"

  dispatch-code:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issues' && github.event.action == 'labeled'
        && github.event.label.name == 'ready-to-code') ||
      (github.event_name == 'issue_comment' && (
        github.event.comment.body == '/code' ||
        startsWith(github.event.comment.body, '/code ')
      ))
    steps:
      - name: Generate dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FULLSEND_DISPATCH_CLIENT_ID }}
          private-key: ${{ secrets.FULLSEND_DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: .fullsend
          permission-actions: write

      - name: Dispatch code stage
        env:
          GH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
          EVENT_TYPE: ${{ github.event_name }}
          SOURCE_REPO: ${{ github.repository }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
        run: |
          gh workflow run dispatch.yml \
            --repo "$DISPATCH_REPO" \
            -f stage=code \
            -f event_type="$EVENT_TYPE" \
            -f source_repo="$SOURCE_REPO" \
            -f event_payload="$EVENT_PAYLOAD"

  dispatch-review:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issues' && github.event.action == 'labeled'
        && github.event.label.name == 'ready-for-review') ||
      (github.event_name == 'issue_comment' && (
        github.event.comment.body == '/review' ||
        startsWith(github.event.comment.body, '/review ')
      )) ||
      github.event_name == 'pull_request_target'
    steps:
      - name: Generate dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FULLSEND_DISPATCH_CLIENT_ID }}
          private-key: ${{ secrets.FULLSEND_DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: .fullsend
          permission-actions: write

      - name: Dispatch review stage
        env:
          GH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
          EVENT_TYPE: ${{ github.event_name }}
          SOURCE_REPO: ${{ github.repository }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
        run: |
          gh workflow run dispatch.yml \
            --repo "$DISPATCH_REPO" \
            -f stage=review \
            -f event_type="$EVENT_TYPE" \
            -f source_repo="$SOURCE_REPO" \
            -f event_payload="$EVENT_PAYLOAD"
