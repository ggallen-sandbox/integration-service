name: Triage Agent
on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Scan issue with Model Armor
        id: scan
        run: |
          gh issue view ${{ github.event.issue.number }} --json title,body --jq '.title + "\n" + (.body // "")' > scan_input.txt
          MATCH=$(.github/scripts/scan-model-armor.sh scan_input.txt "$GCP_LOCATION" "$GCP_PROJECT_ID" "$MODEL_ARMOR_TEMPLATE")
          if [ "$MATCH" = "true" ]; then
            echo "::error::Model Armor detected prompt injection"
            echo "detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "detected=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          MODEL_ARMOR_TEMPLATE: ${{ secrets.MODEL_ARMOR_TEMPLATE }}

      - name: Flag injected issue
        if: steps.scan.outputs.detected == 'true'
        run: |
          MARKER="<!-- fullsend:triage-agent -->"
          NEW_CONTENT="⚠️ **Prompt injection detected.** This issue has been flagged by Google Cloud Model Armor and will not be processed by the agent. A human maintainer will review it."
          .github/scripts/update-comment.sh "${{ github.repository }}" "${{ github.event.issue.number }}" "$MARKER" "$NEW_CONTENT"
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "security/prompt-injection"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate agent app token
        if: steps.scan.outputs.detected != 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AGENT_APP_ID }}
          private-key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}

      - name: Triage issue
        if: steps.scan.outputs.detected != 'true'
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.AI_API_KEY }}
          gemini_model: gemini-3.1-flash-preview
          settings: |
            {
              "tools": {
                "core": [
                  "read_file",
                  "run_shell_command(gh)",
                  "run_shell_command(bash)",
                  "run_shell_command(.github/scripts/update-comment.sh)",
                  "run_shell_command(echo)"
                ]
              }
            }
          prompt: |
            Read the GEMINI.md file for project context.
            Read the .gemini/commands/triage-issue.md skill for detailed instructions.

            Triage GitHub issue #${{ github.event.issue.number }}.

            Issue title: "${{ github.event.issue.title }}"

            Use `gh issue view ${{ github.event.issue.number }}` to read the full issue body.
            Then follow the triage-issue skill steps to classify and label it.

            IMPORTANT: Follow the "Posting Comments" section in triage-issue.md
            for in-place comment updates using the <!-- fullsend:triage-agent --> marker.
          upload_artifacts: 'true'
          github_issue_number: '${{ github.event.issue.number }}'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
