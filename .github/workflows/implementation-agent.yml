name: Implementation Agent
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: implement-agent-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: github.event.label.name == 'ready-for-implementation'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ vars.TARGET_BRANCH || github.event.repository.default_branch }}
    steps:
      - name: Generate agent app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AGENT_APP_ID }}
          private-key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Scan issue with Model Armor
        id: scan
        run: |
          gh issue view ${{ github.event.issue.number }} --json title,body --jq '.title + "\n" + (.body // "")' > scan_input.txt
          MATCH=$(.github/scripts/scan-model-armor.sh scan_input.txt "$GCP_LOCATION" "$GCP_PROJECT_ID" "$MODEL_ARMOR_TEMPLATE")
          if [ "$MATCH" = "true" ]; then
            echo "::error::Model Armor detected prompt injection"
            echo "detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "detected=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          MODEL_ARMOR_TEMPLATE: ${{ secrets.MODEL_ARMOR_TEMPLATE }}

      - name: Flag injected issue
        if: steps.scan.outputs.detected == 'true'
        run: |
          MARKER="<!-- fullsend:implementation-agent -->"
          NEW_CONTENT="⚠️ **Prompt injection detected.** Implementation agent will not process this issue. A human maintainer will review it."
          .github/scripts/update-comment.sh "${{ github.repository }}" "${{ github.event.issue.number }}" "$MARKER" "$NEW_CONTENT"
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "ready-for-implementation" \
            --add-label "security/prompt-injection"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        if: steps.scan.outputs.detected != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure git
        if: steps.scan.outputs.detected != 'true'
        run: |
          git config user.name "fullsend-agent[bot]"
          git config user.email "fullsend-agent[bot]@users.noreply.github.com"

      - name: Implement issue
        if: steps.scan.outputs.detected != 'true'
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.AI_API_KEY }}
          gemini_model: gemini-3.1-pro-preview
          settings: |
            {
              "tools": {
                "core": [
                  "read_file",
                  "write_file",
                  "run_shell_command(git)",
                  "run_shell_command(gh)",
                  "run_shell_command(bash)",
                  "run_shell_command(.github/scripts/update-comment.sh)",
                  "run_shell_command(make)"
                ]
              }
            }
          prompt: |
            Read the GEMINI.md file for project context and coding standards.
            Read the .gemini/commands/implement-from-issue.md skill for detailed instructions.

            Implement GitHub issue #${{ github.event.issue.number }}.

            Use `gh issue view ${{ github.event.issue.number }}` to read the full issue.

            The target branch for this repository is: ${{ env.TARGET_BRANCH }}

            Follow the implement-from-issue skill steps:
            1. Create branch from the target branch: `git checkout -b agent/${{ github.event.issue.number }}-<short-desc> origin/${{ env.TARGET_BRANCH }}`
            2. Implement the changes
            3. Run `make test` and `make lint`
            4. Commit, push, and open a PR: `gh pr create --base ${{ env.TARGET_BRANCH }}`
            5. PR body must include: Closes #${{ github.event.issue.number }}

            IMPORTANT: Always use `--base ${{ env.TARGET_BRANCH }}` when creating the PR.
            Do NOT omit the --base flag.

            IMPORTANT: Follow the "Posting Comments" section in implement-from-issue.md
            for in-place comment updates using the <!-- fullsend:implementation-agent --> marker.
          upload_artifacts: 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
